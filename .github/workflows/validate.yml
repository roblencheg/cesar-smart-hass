name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check --diff custom_components/cesar_smart/ tests/

      - name: Check manifest.json
        run: python -c "import json; d=json.load(open('custom_components/cesar_smart/manifest.json')); assert d['domain']=='cesar_smart'; assert d['config_flow']==True; print('manifest OK')"

      - name: Check hacs.json
        run: python -c "import json; d=json.load(open('hacs.json')); assert 'name' in d; print('hacs.json OK')"

      - name: Run tests
        run: pytest tests/ -v
