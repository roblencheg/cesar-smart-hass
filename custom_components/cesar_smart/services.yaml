force_refresh:
  name: Force Refresh
  description: "Force HA to immediately poll the Cesar Smart API for fresh data. Does NOT send any command to the vehicle. This is a read-only operation."
  fields:
    entry_id:
      name: Config Entry ID
      description: "Optional config entry ID to refresh. If omitted, refreshes all entries."
      example: "01JQXYZ..."
      required: false
      selector:
        text:
    include_full_info:
      name: Include Full Info
      description: "Also reset the full info poll timer so it fetches fresh data."
      default: true
      required: false
      selector:
        boolean:
    include_balance:
      name: Include SIM Balance
      description: "Also reset the SIM balance poll timer so it fetches fresh balance data."
      default: true
      required: false
      selector:
        boolean:

balance_probe:
  name: SIM Balance Probe
  description: "Directly call the SIM balance endpoint and log diagnostic info. Read-only, no commands sent to the vehicle."
  fields:
    entry_id:
      name: Config Entry ID
      description: "Optional config entry ID. If omitted, probes all entries."
      example: "01JQXYZ..."
      required: false
      selector:
        text: